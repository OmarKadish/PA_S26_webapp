    <h1>This Is a HTML Form</h1>
    <h3>Author: Omar Kadish</h3>

    <div id="contact-form" class="card">
        <form id="my_form">
            <div>
                <label for="fname">First Name:</label>
                <input type="text" name="fname" id="fname">
            </div>

            <div>
                <label for="email">Email Address:</label>
                <input type="email" name="email" id="email">
            </div>

            <br>
            <div>
                <label for="dob">Date of Birth:</label>
                <input type="date" name="dob">
            </div>

            <br>
            <div>
                <label for="sex">Male</label>
                <input type="radio" name="sex" value="Male">
                <label for="sex">Female</label>
                <input type="radio" name="sex" value="Female">
            </div>

            <div>
                <p>Choose your Favorite Language:</p>
                <input type="checkbox" class="lang" name="lang" value="HTML">
                <label for="lang">HTML</label><br>
                <input type="checkbox" class="lang" name="lang" value="CSS">
                <label for="lang">CSS</label><br>
                <input type="checkbox" class="lang" name="lang" value="JS">
                <label for="lang">JS</label><br>
            </div>

            <br>
            <div>
                <label for="file">Photo:</label>
                <input type="file" name="file">
            </div>

            <br>
            <div>
                <label for="tel">Tel:</label>
                <input type="tel" name="tel" required>
            </div>

            <br>
            <button type="submit">Submit</button>

        </form>
        <h3>Form Submission: </h3>
        <div id="console_view">Form output will be here...</div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
