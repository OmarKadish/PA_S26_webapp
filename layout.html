    <h1>This Is a HTML/CSS Layout</h1>
    <h3>Author: Omar Kadish</h3>

    <div class="card">
        <div class="floating-badge">Absolute Paragraph</div>

        <h1>Layout/Calculator</h1>
        <section>
            <h2>Enter two numbers to see the power of JS</h2>

            <input type="number" id="num1" placeholder="Number 1">
            <input type="number" id="num2" placeholder="Number 2">

            <div class="flex-container">
                <button onclick="calc('+')" class="flex-item">Add +</button>
                <button onclick="calc('-')" class="flex-item">Subtract -</button>
                <button onclick="calc('*')" class="flex-item">Multiply *</button>
            </div>
            <div>
                <span id="result">0</span>
            </div>
        </section>



    </div>
